<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PARA TI 💜 CASTILLO</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --secondary: #00ffff; --bg-dark: #000; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--bg-dark); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }

        .background-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://i.pinimg.com/originals/82/3e/7b/823e7b165510656096056b3e75e9540c.jpg'); background-size: cover; background-position: center; filter: blur(10px) brightness(0.3); transform: scale(1.1); z-index: -1; }

        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; text-align: center; transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; visibility: hidden; }
        .screen.active { transform: translateY(0); z-index: 20; visibility: visible; }

        .neon-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem; letter-spacing: 5px; color: #fff; text-shadow: 0 0 10px var(--primary), 0 0 20px var(--secondary); margin-bottom: 20px; }

        /* LIBRO DE VISITAS */
        .guestbook-container { background: rgba(0, 0, 0, 0.7); border: 1px solid var(--primary); padding: 15px; border-radius: 15px; width: 100%; max-width: 350px; max-height: 50vh; overflow-y: auto; margin-bottom: 15px; }
        input, textarea { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid var(--secondary); color: white; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-family: 'Montserrat'; }
        .comment { text-align: left; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 8px 0; font-size: 0.9rem; }
        .comment b { color: var(--secondary); }

        button { padding: 12px 24px; margin: 5px; border: none; border-radius: 10px; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        
        .camera-ui { width: 260px; height: 350px; border: 2px solid rgba(255,255,255,0.3); border-radius: 20px; position: relative; overflow: hidden; background: rgba(255,255,255,0.05); }
        .heart { position: absolute; font-size: 40px; z-index: 100; animation: fall 3s linear forwards; }
        @keyframes fall { from { top: -10%; } to { top: 110%; } }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="screen active" id="s0">
        <h1 class="neon-title">CASTILLO 💜</h1>
        <button onclick="startApp()">INICIAR EXPERIENCIA</button>
    </div>

    <div class="screen" id="s1">
        <h2>¿Mood de hoy? 😏</h2>
        <div>
            <button onclick="setMsg('⚽ ¡América hasta la muerte! 🔥')">⚽</button>
            <button onclick="setMsg('😂 TikTokera nivel pro 💃')">😂</button>
            <button onclick="setMsg('😡 Pero así te quiero 😜')">😡</button>
        </div>
        <p id="msg-display" style="color:var(--secondary); min-height:25px;"></p>
        <button onclick="goTo(2)">SIGUIENTE</button>
    </div>

    <div class="screen" id="s2">
        <h2 style="font-family:'Bebas Neue';">🎮 ATRAPA LOS 💜</h2>
        <p>Score: <span id="score">0</span></p>
        <button id="play-btn" onclick="startHearts()">JUGAR</button>
        <button onclick="goTo(3)">SIGUIENTE</button>
    </div>

    <div class="screen" id="s3">
        <h2 style="font-family:'Bebas Neue';">📸 RECUERDOS</h2>
        <button onclick="playVoz()">🎤 ESCUCHAR VOZ</button>
        <button onclick="goTo(4)">DEJAR MENSAJE</button>
    </div>

    <div class="screen" id="s4">
        <h2 style="font-family:'Bebas Neue';">💬 MENSAJES DE AMIGOS</h2>
        <div class="guestbook-container" id="comments-list">
            </div>
        <input type="text" id="guest-name" placeholder="Tu nombre...">
        <textarea id="guest-msg" placeholder="Tu mensaje para Libia..."></textarea>
        <button onclick="saveComment()">PUBLICAR 💜</button>
        <button onclick="goTo(5)" style="background:none; border:1px solid white;">SIGUIENTE</button>
    </div>

    <div class="screen" id="s5">
        <div class="camera-ui">
            <div style="position:absolute; top:20%; left:50%; transform:translateX(-50%); font-size:3rem;">👑</div>
            <div style="position:absolute; top:40%; left:50%; transform:translateX(-50%); width:120px; height:40px; border:3px solid var(--primary); border-radius:10px; box-shadow:0 0 15px var(--primary);"></div>
        </div>
        <p style="font-size:0.7rem; margin-top:10px;">FILTRO: CASTILLO_ULTRA_V1.0</p>
        <button onclick="goTo(6); startFinalType();">VER FINAL</button>
    </div>

    <div class="screen" id="s6">
        <div id="final-typed" style="font-size:0.9rem; text-align:left; white-space:pre-wrap;"></div>
        <div id="dev-block" style="font-family:'Fira Code'; color:var(--secondary); font-size:0.75rem; margin-top:20px; text-align:left; border-top:1px solid var(--secondary); padding-top:10px; display:none;"></div>
    </div>

    <audio id="mananitas" src="mananitas.mp3" loop></audio>
    <audio id="voz" src="mikoWassup.mp3"></audio>

<script>
    function goTo(index) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('s' + index).classList.add('active');
    }

    function startApp() { document.getElementById('mananitas').play(); goTo(1); renderComments(); }
    function playVoz() { document.getElementById('mananitas').pause(); document.getElementById('voz').play(); }
    function setMsg(t) { document.getElementById('msg-display').innerText = t; }

    function startHearts() {
        document.getElementById('play-btn').style.display = 'none';
        let c = 0;
        const iv = setInterval(() => {
            const h = document.createElement('div'); h.className = 'heart'; h.innerText = '💜';
            h.style.left = Math.random() * 80 + 10 + '%';
            h.onclick = () => { h.remove(); document.getElementById('score').innerText = parseInt(document.getElementById('score').innerText)+1; };
            document.body.appendChild(h);
            c++; if(c > 15) clearInterval(iv);
            setTimeout(() => h.remove(), 3000);
        }, 500);
    }

    // LÓGICA COMENTARIOS
    function saveComment() {
        const name = document.getElementById('guest-name').value;
        const msg = document.getElementById('guest-msg').value;
        if(name && msg) {
            const comments = JSON.parse(localStorage.getItem('libia_comments') || '[]');
            comments.push({ name, msg });
            localStorage.setItem('libia_comments', JSON.stringify(comments));
            document.getElementById('guest-name').value = '';
            document.getElementById('guest-msg').value = '';
            renderComments();
        } else { alert("Escribe tu nombre y mensaje!"); }
    }

    function renderComments() {
        const container = document.getElementById('comments-list');
        const comments = JSON.parse(localStorage.getItem('libia_comments') || '[]');
        container.innerHTML = comments.length ? '' : '<p style="font-size:0.8rem; opacity:0.5;">No hay mensajes aún. ¡Sé el primero!</p>';
        comments.forEach(c => {
            container.innerHTML += `<div class="comment"><b>${c.name}:</b> ${c.msg}</div>`;
        });
        container.scrollTop = container.scrollHeight;
    }

    function startFinalType() {
        const mainTxt = "¡Feliz Cumpleaños! 💜\n\nCASTILLO\n\nSé que no eres de muchos abrazos, pero eres de las personas más importantes en mi vida.\nGracias por todo lo compartido.\nTe quiero un chingo 😎🔥";
        const devTxt = "\n\n> STATUS: Cumpleaños optimizado al 100%\n> DEV: El mejor hermano (Ing. en Sistemas)\n> INFO: Si te gustó la página, el creador está disponible.\n📸 IG: @aaleex.castillo";
        
        let i = 0; const target = document.getElementById('final-typed');
        function type() {
            if(i < mainTxt.length) { target.textContent += mainTxt.charAt(i); i++; setTimeout(type, 50); }
            else { 
                const devTarget = document.getElementById('dev-block');
                devTarget.style.display = 'block';
                devTarget.textContent = devTxt;
                launchConfetti();
            }
        }
        setTimeout(type, 500);
    }

    function launchConfetti() {
        setInterval(() => {
            const c = document.createElement('div');
            c.style.cssText = `position:fixed;width:8px;height:8px;background:${Math.random()>0.5?'#bc13fe':'#00ffff'};left:${Math.random()*100}vw;top:-10px;border-radius:50%;z-index:1000;`;
            c.animate([{transform:'translateY(0)'},{transform:'translateY(100vh) rotate(720deg)'}], 3000);
            document.body.appendChild(c); setTimeout(()=>c.remove(), 3000);
        }, 250);
    }
</script>
</body>
</html>
